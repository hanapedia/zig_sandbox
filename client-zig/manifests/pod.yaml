apiVersion: v1
kind: Pod
metadata:
  name: zig-k8s-client
  namespace: default
  labels:
    app: zig-k8s-client
spec:
  serviceAccountName: zig-k8s-client
  containers:
    - name: client
      image: zig-k8s-client:latest
      imagePullPolicy: Never  # Use local image loaded into kind
      resources:
        limits:
          memory: "64Mi"
          cpu: "100m"
        requests:
          memory: "32Mi"
          cpu: "50m"
  restartPolicy: Never  # Run once and exit
