apiVersion: v1
kind: ServiceAccount
metadata:
  name: zig-k8s-client
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zig-k8s-client
rules:
  # Core resources - read only
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - configmaps
      - secrets
      - nodes
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: zig-k8s-client
subjects:
  - kind: ServiceAccount
    name: zig-k8s-client
    namespace: default
roleRef:
  kind: ClusterRole
  name: zig-k8s-client
  apiGroup: rbac.authorization.k8s.io
